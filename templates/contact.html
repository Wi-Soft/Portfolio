{% load static %}

<section class="section contact">
  <h2 class="section-title">Contact & References</h2>

  <div class="contact-grid">

    <div class="contact-card">
      <i class="fab fa-linkedin contact-icon-large"></i>
      <h3>LinkedIn</h3>
      <p>Connect professionally</p>
      <a href="https://www.linkedin.com/in/alphonce-rotich" target="_blank">
        Alphonce Rotich
      </a>
    </div>

    <div class="contact-card">
      <i class="fas fa-envelope contact-icon-large"></i>
      <h3>Email</h3>
      <p>For inquiries and opportunities</p>
      <a href="mailto:alphoncerotich30@gmail.com">
        alphoncerotich30@gmail.com
      </a>
    </div>

    <div class="contact-card">
      <i class="fas fa-phone contact-icon-large"></i>
      <h3>Phone</h3>
      <p>Available for calls</p>
      <p class="phone-number">+254 708 477 938</p>
    </div>

    <div class="contact-card">
      <i class="fas fa-file-alt contact-icon-large"></i>
      <h3>References</h3>
      <p>Professional references</p>
      <p class="references">Available upon request</p>
    </div>

  </div>
</section>


<style>
.contact{
  padding:50px 20px;
  text-align:center;
}

.section-title{
  text-align:center;
  margin-bottom:40px;
  font-size:2rem;
}


.contact-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:25px;
  max-width:1200px;
  margin:auto;
}


.contact-card{
  background:#f5f5f5;
  padding:30px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  transition:all 0.3s ease;
}

.contact-icon-large{
  font-size:36px;
  color:#1e3c72;
  margin-bottom:10px;
  transition:transform 0.3s ease;
}

.contact-card a{
  color:#4a90e2;
  text-decoration:none;
}

.phone-number{
  color:#1e3c72;
  font-weight:500;
}

.references{
  color:#666;
  font-style:italic;
}


.contact-card:hover{
  transform:translateY(-8px);
  box-shadow:0 12px 25px rgba(0,0,0,0.2);
}

.contact-card:hover .contact-icon-large{
  transform:scale(1.2);
  color:#4a90e2;
}

/* ---------- RESPONSIVE DESIGN ---------- */

/* Split screen / small laptop */
@media (max-width:1000px){
  .contact-grid{
    grid-template-columns:repeat(2,1fr);
  }
}

/* Tablet */
@media (max-width:700px){
  .contact-grid{
    grid-template-columns:1fr;
  }

  .section-title{
    font-size:1.6rem;
  }
}

/* Small phone */
@media (max-width:400px){
  .contact-card{
    padding:20px;
  }

  .contact-icon-large{
    font-size:30px;
  }
}

</style>
